<!DOCTYPE html>
<html>

<head>
    <title>License Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1>License Management System</h1>

    <div class="form">
        <input type="text" id="name" placeholder="University Name">
        <input type="number" id="duration" placeholder="Duration (days)">
        <button onclick="addLicense()">Add License</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>University Name</th>
                <th>Activation Code</th>
                <th>Expiry</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="licenseTable"></tbody>

    </table>

    <!-- Edit License Modal -->
    <div id="editModal" class="modal">

        <div class="modal-content">

            <h2>Edit License</h2>

            <p style="margin-bottom: 0 ; text-align: left;"><b>License Name</b></p>
            <input type="text" id="editName" placeholder="License Name">

            <p style="margin-bottom: 0 ; text-align: left;"><b>Expiry</b></p>
            <input type="date" id="editExpiry">

            <div class="modal-buttons">
                <button onclick="saveEdit()">Save</button>
                <button onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Renew License Modal -->
    <div id="renewModal" class="modal">
        <div class="modal-content">
            <h2>Renew License</h2>
            <input type="number" id="renewDays" placeholder="Days to add">
            <div class="modal-buttons">
                <button onclick="saveRenew()">Renew</button>
                <button onclick="closeRenewModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h2>Confirm Delete</h2>
            <p>Are you sure you want to delete this license?</p>
            <div class="modal-buttons">
                <button onclick="confirmDelete()">Yes, Delete</button>
                <button onclick="closeDeleteModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
